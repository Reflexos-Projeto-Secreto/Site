<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflexos | Cadastro</title>
    <link rel="stylesheet" type="text/css" href="../css/cadastro.css">
    <link rel="stylesheet" type="text/css" href="../js/cadastro.js">
  </head>
  <body>
    <div class="container">
      <div class="imagemLateral"></div>
      <div class="container-Cadastro">
        <div class="box-Cadastro">
          <div class="geral-Cadastro">
            <h1>Cadastro</h1>
            <div class="input-Cadastro">
              <div class="input-Filho">
                <h4>Nome</h4>
                <input type="text" id="nome">
              </div>
            </div>
            <div class="input-Cadastro">
              <div class="input-Filho">
                <h4>Username</h4>
                <input type="text" id="username">
              </div>
            </div>
            <div class="input-Cadastro">
              <div class="input-Filho">
                <h4>Email</h4>
                <input type="email" id="email">
              </div>
            </div>
            <div class="input-Cadastro">
              <div class="input-Filho">
                <h4>Senha</h4>
                <input type="password" id="senha">
              </div>
            </div>
            <div class="input-Cadastro">
              <div class="input-Filho">
                <h4>Confirmar senha</h4>
                <input type="password" id="confirmarSenha">
              </div>
            </div>
            <button onclick="cadastro()">Cadastro</button>
            <div class="cadastrar">
                <span>Já tem um login</span>
                <a href="faleConosco.html" class="registrar-cadastro">Clique aqui</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

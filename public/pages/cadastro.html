<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflexos | Cadastro</title>
  <link rel="stylesheet" type="text/css" href="../css/cadastro.css">
  <link rel="stylesheet" type="text/js" href="../js/cadastro.js">
</head>

<body>
  <div class="container">
    <div class="imagem-lateral"></div>
    <div class="container-cadastro">
      <div class="box-cadastro">
        <div class="geral-cadastro">
          <h1>Cadastro</h1>
          <div class="input-cadastro">
            <div class="input-filho">
              <h4>Nome</h4>
              <input type="text" id="nome">
            </div>
          </div>
          <div class="input-cadastro">
            <div class="input-filho">
              <h4>Username</h4>
              <input type="text" id="username">
            </div>
          </div>
          <div class="input-cadastro">
            <div class="input-filho">
              <h4>Email</h4>
              <input type="email" id="email">
            </div>
          </div>
          <div class="input-cadastro">
            <div class="input-filho">
              <h4>Senha</h4>
              <input oninput="verificarsenha()" type="password" id="senha">
              <span id="senha_forte"></span>
            </div>
          </div>
          <div class="input-cadastro">
            <div class="input-filho">
              <h4>Confirmar senha</h4>
              <input type="password" id="confirmarSenha">
            </div>
          </div>
          <button onclick="cadastrar()">Cadastro</button>
          <div class="cadastrar">
            <span>Já tem um login</span>
            <a href="faleConosco.html" class="registrar-cadastro">Clique aqui</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>

<script>

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome.value;
    var usernameVar = username.value;
    var emailVar = email.value;
    var senhaVar = senha.value;
    var confirmacaoSenhaVar = confirmarSenha.value;
    var especiais = ["!", "@", "#", "$", "%", "&", "*", "(", ")", "-", "_", "+", "=", "[", "]", "{", "}", "/", "?", ".", ",", ":", ";", "<", ">", "^", "~", "`", "'", '"', "|"]
    var tem_especial = false
    var senhaMenor = senhaVar.toLowerCase()
    var senhaMaior = senhaVar.toUpperCase()

    for (let i = 0; i < especiais.length; i++) {
      if (senha.includes(especiais[i])) {
        tem_especial = true
      }
    }
    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      usernameVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Preencha todos os campos!";

      finalizarAguardar();
      return false;
    } else if (nomeVar.length < 3) {
      mensagem_erro.innerHTML = "Nome deve ter pelo menos 3 caracteres!";
    } else if (usernameVar.length < 3) {
      mensagem_erro.innerHTML = "Username deve ter pelo menos 3 caracteres!";
    } else if (!emailVar.includes("@") || !emailVar.includes(".com")) {
      mensagem_erro.innerHTML = "Email inválido!";
    } else if (senhaVar.length < 8) {
      mensagem_erro.innerHTML = "Senha deve ter pelo menos 8 caracteres!";
    } else if (!tem_especial) {
      mensagem_erro.innerHTML = "Senha deve ter pelo menos um caractere especial!";
    }else if (senhaVar == senhaMaior || senhaVar == senhaMenor) {
      mensagem_erro.innerHTML = "Senha deve conter maiusculas e minusculas!";
    } else if (confirmacaoSenhaVar != senhaVar) {
      mensagem_erro.innerHTML = "As senhas não coincidem!";
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        userServer: usernameVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }

  function verificarsenha(){
    var senhaVar = senha.value;
    var especiais = ["!", "@", "#", "$", "%", "&", "*", "(", ")", "-", "_", "+", "=", "[", "]", "{", "}", "/", "?", ".", ",", ":", ";", "<", ">", "^", "~", "`", "'", '"', "|"]
    var tem_especial = false
    var senhaMenor = senhaVar.toLowerCase()
    var senhaMaior = senhaVar.toUpperCase()

    for (let i = 0; i < especiais.length; i++) {
      if (senha.includes(especiais[i])) {
        tem_especial = true
      }

    }

    if(senhaVar.length < 8 && !tem_especial && (senhaVar == senhaMaior || senhaVar == senhaMenor)){
      senha_forte.innerHTML = "senha fraca"
      senha_forte.style.color = "red"
    }else if (senhaVar.length < 8 && !tem_especial){
      senha_forte.innerHTML = "senha média"
      senha_forte.style.color = "yellow"
    }else{
      senha_forte.innerHTML = "senha forte"
      senha_forte.style.color = "green"
    }

  }
</script>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflexos | Painel</title>
    <link rel="stylesheet" type="text/css" href="../css/painel.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="transicao"></div>
    <div class="container" id="container">
      <div class="caixa-login"><button onclick="login()">Login</button></div>
      <div class="container-painel">
        <div class="titulo-painel"><h2>Escolha o seu andar</h2></div>
        <div class="painel-botoes">
          <div class="box-botoes">
            <a onclick="hexa()" id="hexas">Andar Hexatombe</a>
            <div class="botao-pai">
              <div class="botao-filho">
                <a onclick="julia()" id="julia">Andar Julia</a>
              </div>
              <div class="botao-filho">
                <a onclick="debora()" id="debora">Andar Débora</a>
              </div>
            </div>
            <div class="botao-pai">
              <div class="botao-filho">
               <a onclick="quiz()" id="quiz">Quizzes</a>
              </div>
              <div class="botao-filho">
                <a onclick="dashboard()" id="dash">Dashboard</a>
              </div>
            </div>
            <div class="botao-pai botao-baixo">
              <div class="botao-filho">
                <a onclick="juntas()" id="juntas">Andar juntas</a>
              </div>
              <div class="botao-filho">
                <a onclick="chat()" id="chat">Chat</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  window.onload = function () {
      const transicao = document.getElementById("transicao");

      setTimeout(() => {
          transicao.classList.add("fade-open");
      }, 500);
  }

  function aplicarBlur() {
      document
          .getElementById("container")
          .classList.add("container-ativo");
  }

  function login() {
      const overlay = document.getElementById('transicao');
      overlay.classList.add('fade-out');
      overlay.classList.add('transicao-ativo');
      setTimeout(() => {
          window.location.href = "../pages/login.html";
      }, 1500);
  }

  function julia() {
      const overlay = document.getElementById('transicao');
      overlay.classList.add('fade-out');
      overlay.classList.add('transicao-ativo');
      setTimeout(() => {
          window.location.href = "../pages/andarJulia.html";
      }, 1500);
  }

  function debora() {
      const overlay = document.getElementById('transicao');
      overlay.classList.add('fade-out');
      overlay.classList.add('transicao-ativo');
      setTimeout(() => {
          window.location.href = "../pages/andarDebora.html";
      }, 1500);
  }

  function quiz() {
      const overlay = document.getElementById('transicao');
      overlay.classList.add('fade-out');
      overlay.classList.add('transicao-ativo');
      setTimeout(() => {
          window.location.href = "../pages/quiz.html";
      }, 1500);
  }

  function dashboard() {
      const overlay = document.getElementById('transicao');
      overlay.classList.add('fade-out');
      overlay.classList.add('transicao-ativo');
      setTimeout(() => {
          window.location.href = "../pages/dashboard.html";
      }, 1500);
  }

  function juntas() {
      const overlay = document.getElementById('transicao');
      overlay.classList.add('fade-out');
      overlay.classList.add('transicao-ativo');
      setTimeout(() => {
          window.location.href = "../pages/andarJuntas.html";
      }, 1500);
  }

  function chat() {
      const overlay = document.getElementById('transicao');
      overlay.classList.add('fade-out');
      overlay.classList.add('transicao-ativo');
      setTimeout(() => {
          window.location.href = "../pages/chat.html";
      }, 1500);
  }
</script>

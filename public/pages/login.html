<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflexos | Login</title>
    <link rel="stylesheet" type="text/css" href="../css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div class="container-login">
        <div class="box-login">
          <div class="sair">
            <button onclick="sair()">X</button>
          </div>
          <div class="geral-login">
            <h1>Login</h1>
            <div class="input-login">
              <div class="input-filho">
                <input placeholder="Email" type="email" id="email" />
              </div>
            </div>
            <div class="input-login">
              <div class="input-filho">
                <input placeholder="Senha" type="password" id="senha" />
              </div>
            </div>
            <button onclick="entrar()" class="botao-login">Logar</button>
            <div class="cadastrar">
                <span>Não possui conta?</span>
                <a href="faleConosco.html" class="registrar-cadastro"> Cadastra-se</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
    function entrar() {

        var emailVar = email.value;
        var senhaVar = senha.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.emailUsuario;
                    sessionStorage.NOME_USUARIO = json.nomeUsuario;
                    sessionStorage.ID_USUARIO = json.idUsuario;
                    sessionStorage.USERNAME_USUARIO = json.nickname

                    setTimeout(function () {
                        window.location = "/elevador";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>

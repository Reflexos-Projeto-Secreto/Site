<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflexos | Login</title>
    <link rel="stylesheet" type="text/css" href="../css/login.css" />
    <link rel="stylesheet" type="text/js" href="../js/login.js" />
  </head>
  <body>
    <div class="container">
      <div class="imagem-lateral"></div>
      <div class="container-login">
        <div class="box-login">
          <div class="geral-login">
            <h1>Login</h1>
            <div class="input-login">
              <div class="input-filho">
                <h4>Email</h4>
                <input type="email" id="email" />
              </div>
            </div>
            <div class="input-login">
              <div class="input-filho">
                <h4>Senha</h4>
                <input type="password" id="senha" />
              </div>
            </div>
            <button onclick="entrar()">Login</button>
            <div class="cadastrar">
                <span>Ainda não tem um login?</span>
                <a href="faleConosco.html" class="registrar-login">Clique aqui</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
    function entrar() {

        var emailVar = email.value;
        var senhaVar = senha.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.emailUsuario;
                    sessionStorage.NOME_USUARIO = json.nomeUsuario;
                    sessionStorage.ID_USUARIO = json.idUsuario;
                    sessionStorage.USERNAME_USUARIO = json.nickname

                    setTimeout(function () {
                        window.location = "/elevador";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>

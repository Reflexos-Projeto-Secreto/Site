<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflexos | Config</title>
    <link rel="stylesheet" type="text/css" href="../css/config.css">
    <link rel="stylesheet" type="text/js" href="../js/config.js">
  </head>
  <body>
    <div class="container">
      <div class="container-config">
        <div class="box-config">
          <div class="geral-config">
            <h1>Configuração</h1>
            <div class="container-imagem">
              <img src="../assets/imgs/geral/usuario.png" id="imgPerfil" onclick="mudarImagemPerfil()" onerror="this.src='../assets/imgs/geral/usuario.png'">
              <input type="file" id="inpImagem" onchange="salvarImagemPerfil()" hidden>
            </div>
            <div class="input-config">
              <div class="input-filho">
                <h4>Nome</h4>
                <input type="text" id="nome" />
              </div>
              <div class="input-filho">
                <h4>Username</h4>
                <input type="text" id="username" />
              </div>
            </div>
            <div class="input-config">
              <div class="input-filho">
                <h4>Email</h4>
                <input type="email" id="email" />
              </div>
              <div class="input-filho">
                <h4>Senha</h4>
                <input type="password" id="senha" />
              </div>
            </div>
            <button onclick="salvar()">Salvar</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

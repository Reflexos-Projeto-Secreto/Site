<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflexos | Config</title>
  <link rel="stylesheet" type="text/css" href="../css/config.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="transicao"></div>
  <div class="container">
    <div class="container-config">
      <div class="imagem-config">
        <img src="../assets/imgs/config/menu.png" alt="">
      </div>
      <div class="box-config">
        <div class="geral-config">
          <button onclick="elevador()" class="eleva-dor"></button>
          <div class="container-imagem">
            <img src="" id="imgPerfil" onclick="mudarImagemPerfil()">
            <button onclick="alterBotao()" id="alterarBtn"></button>
            <input type="file" id="inpImagem" onchange="salvarImagemPerfil()" hidden>
          </div>
          <div class="input-config">
            <div class="input-filho">
              <input placeholder="Nome" type="text" id="nome" />
            </div>
            <div class="input-filho">
              <input placeholder="Username" type="text" id="username" />
            </div>
          </div>
          <div class="input-config">
            <div class="input-filho">
              <input placeholder="Email" type="email" id="email" />
            </div>
            <div class="input-filho">
              <input placeholder="Senha" type="password" id="senha" />
            </div>
          </div>
          <div class="botoes-config">
            <button onclick="salvar()" id="salvar"></button>
            <button onclick="sair()" id="sair"></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>

<script>
    var fotoUsuario = sessionStorage.getItem("FOTO_USUARIO");
    if (fotoUsuario) {
      imgPerfil.src = fotoUsuario;
    }
    const idUsuario = sessionStorage.getItem("ID_USUARIO");
    const emailUsuario = sessionStorage.getItem("EMAIL_USUARIO");
    const nomeUsuario = sessionStorage.getItem("NOME_USUARIO");
    const usernameUsuario = sessionStorage.getItem("USERNAME_USUARIO");

    function sumirMensagem() {
      cardErro.style.display = "none";
    }

    function mudarImagemPerfil() {
      inpImagem.click();
    }

    function salvarImagemPerfil() {
      var arquivo = inpImagem.files[0];

      if (arquivo) {
        var reader = new FileReader();

        reader.onload = function (e) {
          imgPerfil.src = e.target.result;
          sessionStorage.setItem("FOTO_USUARIO", e.target.result);
        }

        reader.readAsDataURL(arquivo);
      }
    }

    function salvar() {
      var nomeNovo = nome.value;
      var usernameNovo = username.value;
      var emailNovo = email.value;
      var senhaNovo = senha.value;

      if (nomeNovo == "" || usernameNovo == "" || emailNovo == "" || senhaNovo == "") {
        alert("Os campos não podem estar em branco!");
        return false;
      } else if (nomeNovo == nomeUsuario || usernameNovo == usernameUsuario || emailNovo == emailUsuario) {
        alert("As modificações não podem ser iguais as informações atuais!");
        return false;
      }

      fetch(`/config/buscarSenha?idUsuario=${idUsuario}`)
        .then(function (resposta) {
          return resposta.json();
        })
        .then(function (json) {
          console.log(json.senhaUsuario);
          var senhaAtual = json.senhaUsuario;

          if (senhaNovo == senhaAtual) {
            alert("A nova senha não pode ser igual à senha atual!");
            return false;
          } else {
            fetch("/config/mudarInfo", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                nomeServerNovo: nomeNovo,
                usernameServerNovo: usernameNovo,
                emailServerNovo: emailNovo,
                senhaServerNovo: senhaNovo,
                idUsuario: idUsuario
              })
            }).then(function (resposta) {
              console.log("STATUS:", resposta.status);
              console.log("ESTOU NO THEN DO config()!")
              if (resposta.ok) {
                console.log(resposta);
                setInterval(sumirMensagem, 5000);
              }
            }).catch(function (erro) {
              console.log(erro);
            });
          }
        })
        .catch(function (erro) {
          console.log(erro);
        });
    }
  
    window.onload = function () {
        const transicao = document.getElementById("transicao");

        setTimeout(() => {
            transicao.classList.add("fade-open");
        }, 500);
    }

    function elevador() {
        const overlay = document.getElementById('transicao');
        overlay.classList.add('fade-out');
        overlay.classList.add('transicao-ativo');
        setTimeout(() => {
            window.location.href = "elevadorGeral.html";
        }, 1500);
    }
</script>

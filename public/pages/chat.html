<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflexos | Elevador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="../css/chat.css" />
</head>

<body>
  <div class="container-geral-chat">
    <div class="container-mensagem">
      <div class="cabecalho-chat">
        <img src="../assets/imgs/Chat/terra.webp" alt="">
            <div>
              <h3>Chat Global</h3>
              <p>Converse através desse chat</p>
            </div>
        <div style="margin-left: auto;">
          <a href="painel.html"><img style="cursor: pointer;" src="../assets/imgs/Chat/letra-x.png" alt=""></a>
        </div>
      </div>

      <div id="mensagem"></div>

      <div id="verificacaoImg" style="display:none">
        <img id="verificacao-Img" />
        <span>nome-da-foto.jpg</span>
        <button onclick="limparImagem()">✕</button>
      </div>

      <div class="barra_mensagem" id="barra">
        <img src="../assets/imgs/Chat/baixar.png" alt="" onclick="abrirSeletor()" />
        <input type="file" id="input" style="display:none" />
        <input type="text" id="textoInput" placeholder="Escreva sua mensagem aqui..." />
        <img src="../assets/imgs/Chat/direcao-de-arte.png" alt="" onclick="enviar()" />
      </div>
    </div>
  </div>
</body>

</html>

<script>
  var nomeUsuario = sessionStorage.getItem('NOME_USUARIO')
  let imagemSelecionada = null


  function criarMensagem(texto, imagem, lado, nomeRemetente) {
    // Esse createElement cria um elemento no html
    const balao = document.createElement('div')
    balao.className = 'mensagem ' + lado

    const nomeSpan = document.createElement('span')
    nomeSpan.className = 'nome-remetente'
    nomeSpan.textContent = nomeRemetente || nomeUsuario
    balao.appendChild(nomeSpan)

    if (texto) {
      const p = document.createElement('p')
      p.textContent = texto
      // ai esse append child coloca o elemento novo dentro do elemento pai que no caso é o div que criamos la em cima :0 (quanta tecnologia meudeus)
      balao.appendChild(p)
    }

    if (imagem) {
      const img = document.createElement('img')
      img.src = imagem
      balao.appendChild(img)
    }

    const lista = document.getElementById('mensagem')
    lista.appendChild(balao)
    // rola para baixo 
    lista.scrollTop = lista.scrollHeight
  }

  function limparImagem() {
    imagemSelecionada = null
    document.getElementById('verificacaoImg').style.display = 'none'
    document.getElementById('verificacao-Img').src = ''
  }

  function abrirSeletor() {
    document.getElementById('input').click()
  }

  async function enviar() {
    const idUsuario = sessionStorage.getItem('ID_USUARIO')
    const texto = document.getElementById('textoInput').value.trim()
    const arquivo = document.getElementById('input').files[0]

    if (!texto && !arquivo) return

    // FormData é o jeito de mandar texto + arquivo juntos pro servidor
    const form = new FormData()
    form.append('conteudoMensagem', texto)
    form.append('fkUsuario', idUsuario)
    if (arquivo) form.append('imagem', arquivo)

    const res = await fetch('/mensagem/enviarMensagem', {
      method: 'POST',
      body: form
    })

    const data = await res.json()

    if (data.ok) {
      criarMensagem(texto, data.urlImagem, 'eu', nomeUsuario)
    }

    document.getElementById('textoInput').value = ''
    limparImagem()
    document.getElementById('input').value = ''
  }


  document.getElementById('input').addEventListener('change', function () {
    const arquivo = this.files[0]
    if (!arquivo) return

    const leitor = new FileReader()
    leitor.onload = function (e) {
      imagemSelecionada = e.target.result
      document.getElementById('verificacao-Img').src = imagemSelecionada
      document.getElementById('verificacaoImg').style.display = 'flex'
    }
    leitor.readAsDataURL(arquivo)
  })


  fetch('/mensagem/listarMensagens')
    .then(function (res) { return res.json() })
    .then(function (mensagens) {
      mensagens.forEach(function (m) {
        // compara o nickname de quem enviou com o usuário logado
        var lado = m.nickname == nomeUsuario ? 'eu' : 'ela'
        criarMensagem(m.conteudoMensagem, m.urlImagem, lado, m.nickname)
      })
    })
</script>

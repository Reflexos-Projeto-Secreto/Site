<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflexos | Elevador</title>
    <link rel="stylesheet" type="text/css" href="../css/chat.css" />
  </head>
  <body>
    <div class="comunidade">
      <div class="chat">
        <div class="chat-titulo">
          <h2>Comunidade</h2>
        </div>
        <div id="mensagens-geral" class="mensagens-chat">
          <div class="mensagem-usuario-outro">
            <span class="nome-usuario" id="nomeOutro">Julia</span>

            <div class="conteudo-mensagem" id="conteudoMensagemOutro">Oi Debora</div>
            <!-- Acho que aqui vai precisar ser js, mas so pra ser ter a base -->
            <span class="horario-mensagem" id="horarioMensagemOutro">16:20</span>
          </div>

          <div class="mensagem-usuario-atual">
            <span class="nome-usuario" id="nomeAtual">Debora</span>

            <div class="conteudo-mensagem" id="conteudoMensagemAtual">Oi julia</div>

            <span class="horario-mensagem" id="horarioMensagemAtual"> 16:22 </span>
          </div>
        </div>

        <form id="formPostagem" class="formulario-chat">
          <div class="campo-chat">
            <textarea id="inputMensagem" maxlength="255"></textarea>
          </div>
          <button class="botao-enviar" id="botaoEnviar" type="submit">Enviar</button>
        </form>
      </div>
    </div>
  </body>
</html>

<script></script>

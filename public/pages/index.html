<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflexos | Home</title>
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <link rel="stylesheet" type="text/js" href="../js/index.js">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  </head>
  <body>
    <div id="transicao"></div>
    <div class="container" id="tela" onclick="entrar()">
      <div class="container-elevador">
        <img src="../assets/imgs/index/logo.png" alt="" class="logo">
        <div class="box-titulo">
          <h2 class="titulo">REFLEXOS</h2>
          <h2 class="reflexo-titulo">REFLEXOS</h2>
        </div>
        <button onclick="entrar()" class="botao-continuar">CLIQUE AQUI PARA CONTINUAR</button>
      </div>
    </div>
  </body>
</html>

<script>

  function entrar() {
      const overlay = document.getElementById('transicao');
      overlay.classList.add('fade-out');
      setTimeout(() => {
          window.location.href = "elevador.html";
      }, 1500);
  }

</script>

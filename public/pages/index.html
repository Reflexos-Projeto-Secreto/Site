<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflexos | Home</title>
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <link rel="stylesheet" type="text/js" href="../js/index.js">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  </head>
  <body>
    <div id="carregando" class="loading">
      <div class="box-loading">
        <img src="../assets/imgs/elevador/elevador lento.gif" alt="">
        <div class="animation">Chamando Elevador</div>
      </div>
    </div>
    <div class="container" id="tela" onclick="entrar()">
      <div class="container-elevador">
        <img src="../assets/imgs/index/logo.png" alt="" class="logo">
        <div class="box-titulo">
          <h2 class="titulo">REFLEXOS</h2>
          <h2 class="reflexo-titulo">REFLEXOS</h2>
        </div>
        <button onclick="entrar()" class="botao-continuar aniate__animated animate__bounce">CLIQUE AQUI PARA CONTINUAR</button>
      </div>
    </div>
  </body>
</html>

<script>
  let clicou = false;

  function entrar() {
    if (clicou) return;
    clicou = true;

    const tela = document.getElementById("tela");
    const carregando = document.getElementById("carregando");

    tela.classList.add("subindo");

    setTimeout(() => {
      carregando.classList.add("ativo");
    }, 500);

    setTimeout(() => {
      window.location.href = "elevador.html";
    }, 4000);
  }

</script>
